name: test-suite

on:
  pull_request:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  pr-fast:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system OCR dependency
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-timeout

      - name: Run fast lane
        run: pytest -m "unit or integration"

  nightly-deep:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OCR dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-timeout

      - name: Generate fixture corpus
        run: python tests/fixtures/generate_corpus.py

      - name: Run deep lane
        run: pytest -m "e2e or security or perf or ocr or slow"
